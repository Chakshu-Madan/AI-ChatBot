<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Support Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
    #chat-toggle { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: #1a73e8; color: white; border: none; font-size: 24px; cursor: pointer; z-index: 1000; box-shadow: 0 4px 16px rgba(26,115,232,0.4); }
    #chat-window { position: fixed; bottom: 90px; right: 24px; width: 370px; height: 520px; background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); display: flex; flex-direction: column; z-index: 999; overflow: hidden; transform: scale(0); transform-origin: bottom right; transition: transform 0.2s; pointer-events: none; }
    #chat-window.open { transform: scale(1); pointer-events: all; }
    .chat-header { background: #1a73e8; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .bot-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .header-info h3 { font-size: 15px; font-weight: 600; }
    .header-info p { font-size: 12px; opacity: 0.85; }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; margin-left: auto; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; }
    .message.bot { align-self: flex-start; }
    .message.user { align-self: flex-end; }
    .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
    .bot .bubble { background: #f1f3f4; color: #202124; border-bottom-left-radius: 4px; }
    .user .bubble { background: #1a73e8; color: white; border-bottom-right-radius: 4px; }
    .source-tag { font-size: 11px; color: #9aa0a6; margin-top: 4px; }
    .typing .bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #9aa0a6; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    .chat-input { padding: 12px 16px; border-top: 1px solid #e8eaed; display: flex; gap: 8px; align-items: flex-end; }
    #user-input { flex: 1; border: 1px solid #e8eaed; border-radius: 22px; padding: 10px 16px; font-size: 14px; outline: none; resize: none; max-height: 100px; font-family: inherit; }
    #send-btn { width: 40px; height: 40px; border-radius: 50%; background: #1a73e8; color: white; border: none; cursor: pointer; font-size: 16px; }
    #send-btn:disabled { background: #ccc; }
  </style>
</head>
<body>
<button id="chat-toggle" onclick="toggleChat()">💬</button>
<div id="chat-window">
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="header-info"><h3>AI Support Assistant</h3><p>Powered by your documents</p></div>
    <div class="online-dot"></div>
  </div>
  <div id="messages">
    <div class="message bot"><div class="bubble">👋 Hello! Ask me anything about our services!</div></div>
  </div>
  <div class="chat-input">
    <textarea id="user-input" rows="1" placeholder="Type your question..." onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>
<script>
  function toggleChat() { document.getElementById('chat-window').classList.toggle('open'); }
  function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
  async function sendMessage() {
    const input=document.getElementById('user-input');
    const msg=input.value.trim(); if(!msg) return;
    addMessage(msg,'user'); input.value='';
    document.getElementById('send-btn').disabled=true;
    const tid=showTyping();
    try {
      const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
      const data=await res.json(); removeTyping(tid);
      addMessage(data.answer||'Sorry, no answer found.','bot',data.sources||[]);
    } catch(e){removeTyping(tid);addMessage('Connection error.','bot');}
    document.getElementById('send-btn').disabled=false;
  }
  function addMessage(text,role,sources=[]){
    const msgs=document.getElementById('messages');
    const div=document.createElement('div'); div.className=`message ${role}`;
    div.innerHTML=`<div class="bubble">${text}</div>`;
    if(sources.length) div.innerHTML+=`<div class="source-tag">📄 ${sources.join(', ')}</div>`;
    msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
  }
  function showTyping(){
    const msgs=document.getElementById('messages'); const id='t'+Date.now();
    msgs.innerHTML+=`<div class="message bot typing" id="${id}"><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    msgs.scrollTop=msgs.scrollHeight; return id;
  }
  function removeTyping(id){const el=document.getElementById(id);if(el)el.remove();}
</script>
</body>
</html>
